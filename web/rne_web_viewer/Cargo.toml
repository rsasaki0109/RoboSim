# Standalone (non-workspace) crate: the web viewer must not join the root
# workspace, whose native-only feature unification would leak into wasm builds.
[workspace]

[package]
name = "rne_web_viewer"
description = "Browser WASM viewer for Robot Native Engine"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
rne_assets = { path = "../../crates/rne_assets" }
rne_ecs = { path = "../../crates/rne_ecs" }
rne_math = { path = "../../crates/rne_math" }
rne_physics = { path = "../../crates/rne_physics" }
rne_render = { path = "../../crates/rne_render" }
rne_render_wgpu = { path = "../../crates/rne_render_wgpu", features = ["viewer"] }
rne_robot = { path = "../../crates/rne_robot" }
rne_urdf_import = { path = "../../crates/rne_urdf_import" }
rne_world = { path = "../../crates/rne_world" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
getrandom = { version = "0.3", features = ["wasm_js"] }
web-sys = { version = "0.3", features = [
    "console",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Window",
] }
winit = { version = "0.30", features = ["rwh_05"] }
wgpu = { version = "24", features = ["webgl"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
