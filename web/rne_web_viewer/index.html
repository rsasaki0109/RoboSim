<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RNE Web Viewer — mm_minimal</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1218;
        color: #d8e1ec;
        font-family: system-ui, sans-serif;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: grab;
      }

      #canvas:active {
        cursor: grabbing;
      }

      #hud {
        position: fixed;
        left: 12px;
        top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        background: rgba(8, 12, 18, 0.72);
        font-size: 13px;
        line-height: 1.4;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="hud">
      RNE Web Viewer — drag to orbit, scroll to zoom<br />
      Arm animation uses a deterministic frame counter (not wall-clock sim time).
    </div>
  </body>
</html>
