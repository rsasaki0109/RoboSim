name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Core workspace CI
        run: cargo run -p xtask -- ci
