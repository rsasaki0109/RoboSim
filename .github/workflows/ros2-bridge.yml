name: ROS 2 Python bridge

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ros2-bridge.yml"
      - "adapters/ros2/rne_ros2_bridge/**"
      - "adapters/ros2/rne_adapter_ros2/**"
      - "crates/rne_py/**"
      - "crates/rne_ai/**"
      - "crates/rne_assets/**"
      - "crates/rne_core/**"
      - "crates/rne_data/**"
      - "crates/rne_ecs/**"
      - "crates/rne_log/**"
      - "crates/rne_math/**"
      - "crates/rne_physics/**"
      - "crates/rne_physics_rapier/**"
      - "crates/rne_robot/**"
      - "crates/rne_sensor/**"
      - "crates/rne_world/**"
  pull_request:
    paths:
      - ".github/workflows/ros2-bridge.yml"
      - "adapters/ros2/rne_ros2_bridge/**"
      - "adapters/ros2/rne_adapter_ros2/**"
      - "crates/rne_py/**"
      - "crates/rne_ai/**"
      - "crates/rne_assets/**"
      - "crates/rne_core/**"
      - "crates/rne_data/**"
      - "crates/rne_ecs/**"
      - "crates/rne_log/**"
      - "crates/rne_math/**"
      - "crates/rne_physics/**"
      - "crates/rne_physics_rapier/**"
      - "crates/rne_robot/**"
      - "crates/rne_sensor/**"
      - "crates/rne_world/**"
  workflow_dispatch:

jobs:
  rne_ros2_bridge:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install Python tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv \
            python3-pip \
            ros-jazzy-rclpy \
            ros-jazzy-simulation-interfaces

      - name: Smoke test rne_ros2_bridge
        run: ./adapters/ros2/rne_ros2_bridge/smoke_test.sh
