# TEMPORARY workflow for validating the mm_minimal settle-physics fix on Linux.
# The real CI workflow does not trigger on non-main branches, so this runs the
# exact same `xtask ci` surface (now with the linux gates removed) plus 3x
# determinism reruns of the formerly gated tests. Delete before merging.
name: debug-rne-ai

on:
  push:
    branches: [fix/mm-minimal-settle-physics]

jobs:
  full-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Core workspace CI (same as main CI)
        run: cargo run -p xtask -- ci

      - name: Determinism reruns of formerly gated tests (3x)
        run: |
          for i in 1 2 3; do
            echo "=== determinism rerun $i ==="
            cargo test -p rne_ai --lib -- --exact \
              mm_minimal_kinematics::tests::fk_matches_sim_at_idle \
              env::mobile_manipulator::episode::tests::place_episode_picks_carries_and_sets_down \
              env::mobile_manipulator::episode::tests::clutter_pick_place_task_matches_transport_place_script \
              env::mobile_manipulator::episode::tests::fixed_clutter_carry_params_place_center_cube \
              env::mobile_manipulator::episode::tests::ik_clutter_policy_completes_center_place \
              env::mobile_manipulator::episode::tests::mobile_clutter_policy_completes_place \
              env::mobile_manipulator::episode::tests::mobile_clutter_transport_script_places_cube_a
            cargo test -p rne_py -- --exact tests::mobile_manipulator_place_episode_succeeds
          done
