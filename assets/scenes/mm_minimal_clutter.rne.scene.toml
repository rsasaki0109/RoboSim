[world]
gravity_m_s2 = [0.0, -9.81, 0.0]
seed = 46

[ground]
enabled = true

[[robots]]
path = "../robots/mm_minimal.rne.robot.toml"

[[obstacles]]
name = "clutter_table"
translation_m = [1.05, 0.52, 0.0]
half_extents_m = [0.40, 0.02, 0.35]
body_type = "fixed"

# Marks the fixed-base clutter place target (`mm_minimal_clutter_place_target`),
# which matches where the scripted IK carry sets the cube down.
[[obstacles]]
name = "drop_zone"
translation_m = [0.795, 0.025, -0.52]
half_extents_m = [0.06, 0.025, 0.06]
body_type = "fixed"

# Cube positions all lie inside the arm's analytic workspace (gripper-base max
# reach is 0.9 m from the shoulder above the origin). The original layout
# (x = 1.05..1.22) was only ever pickable because the arm's unstable contact
# dynamics (interpenetrating colliders + undamped velocity motors) flung the arm
# past its kinematic reach; with the arm fixed to a stable position-held
# equilibrium those spots are simply unreachable.
#
# Layout constraints (see the fixed-base clutter tests):
# - all cubes clear the idle arm's parked corridor (forearm collider x 0.51..0.85,
#   z +/-0.03 at y 0.57..0.63; gripper/fingers x 0.87..0.93, z +/-0.12) — a cube
#   under the parked arm gets pressed into the table and jams the arm against its
#   own grasped payload;
# - `clutter_cube_b` is the pinned pick target for the scripted/RL place task: its
#   approach lane (from the parked gripper at x 0.9, z 0 to the cube) and its
#   carry lane (toward the drop zone at z -0.42) must stay clear of the other
#   cubes, otherwise a flanking finger welds the wrong cube on the way in (the
#   grasp weld triggers on first finger contact);
# - `clutter_cube_a`/`clutter_cube_c` therefore sit on the +z side, outside both
#   of cube_b's lanes.
[[obstacles]]
name = "clutter_cube_a"
translation_m = [0.79, 0.575, 0.20]
half_extents_m = [0.035, 0.035, 0.035]
body_type = "dynamic"
mass_kg = 0.08

[[obstacles]]
name = "clutter_cube_b"
translation_m = [0.75, 0.575, -0.10]
half_extents_m = [0.035, 0.035, 0.035]
body_type = "dynamic"
mass_kg = 0.08

[[obstacles]]
name = "clutter_cube_c"
translation_m = [0.72, 0.575, 0.31]
half_extents_m = [0.035, 0.035, 0.035]
body_type = "dynamic"
mass_kg = 0.08
