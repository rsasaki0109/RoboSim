[world]
gravity_m_s2 = [0.0, -9.81, 0.0]
seed = 48

[ground]
enabled = true

[[robots]]
path = "../robots/mm_mobile.rne.robot.toml"

[[obstacles]]
name = "clutter_table"
# Table height is set relative to the mm_mobile arm's fixed shoulder height (base_y
# 0.25 m + shoulder offset 0.15 m = 0.40 m world Y): the arm has no lift joint, so it
# can only reach objects near that plane. This mirrors the same shoulder-relative
# offset used by the fixed-base `mm_minimal_clutter` scene (table 0.08 m below its
# 0.6 m shoulder height), scaled to `mm_mobile`'s lower arm mount.
translation_m = [1.65, 0.32, 0.0]
half_extents_m = [0.85, 0.02, 0.12]
body_type = "fixed"

[[obstacles]]
name = "clutter_cube_a"
translation_m = [0.95, 0.375, 0.0]
half_extents_m = [0.035, 0.035, 0.035]
body_type = "dynamic"
mass_kg = 0.08

